"$schema" = 'https://starship.rs/config-schema.json'

continuation_prompt = "[.](bright-black) "
format = "$fill[── J.A.R.V.I.S. ──](bold cyan)$fill\n$all"
right_format = "$time   $battery"

[fill]
symbol = "─"
style = "bold cyan"

[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[<](bold green)"
vimcmd_visual_symbol = "[<](bold yellow)"
vimcmd_replace_symbol = "[<](bold purple)"
vimcmd_replace_one_symbol = "[<](bold purple)"

[cmd_duration]
style = "bold yellow"
min_time = 2000

[username]
style_user = "bold cyan"
style_root = "bold red"
show_always = false

[hostname]
ssh_symbol = "ssh "
ssh_only = true
style = "bold blue"

[directory]
style = "bold cyan"
read_only = " ro"

[git_branch]
style = "bold blue"
symbol = "git "
truncation_symbol = "..."

[git_commit]
tag_symbol = " tag "

[git_status]
style = "bold cyan"
ahead = ">"
behind = "<"
diverged = "<>"
renamed = "r"
deleted = "x"

[conda]
style = "bold blue"
symbol = "conda "

[python]
style = "bold cyan"
symbol = "py "
format = 'via [${symbol}(${version} )]($style)'

[aws]
symbol = "aws "

[azure]
symbol = "az "

[battery]
full_symbol = "full "
charging_symbol = "charging "
discharging_symbol = "discharging "
unknown_symbol = ""
empty_symbol = "empty "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold cyan"

[time]
disabled = false
style = "bold cyan"
format = "[$time]($style)"
time_format = "%I:%M %p"

[buf]
symbol = "buf "

[bun]
symbol = "bun "

[c]
symbol = "C "

[cpp]
symbol = "C++ "

[cmake]
symbol = "cmake "

